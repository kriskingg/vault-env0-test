version: 2

deploy:
  steps:
    terraformInit:
      before:
        - name: vault_health_check
          run: curl -I $VAULT_ADDR/v1/sys/health

        - name: check_credentials
          run: env | grep VAULT

        - name: check_secret_resolution
          run: echo $TEST_SECRET

        - name: export_tf_var
          run: echo "TF_VAR_TEST_SECRET=$TEST_SECRET" >> $ENV0_ENV